<script>

const images = {
  "Fotosyntes":"https://images.unsplash.com/photo-1501004318641-b39e6451bec6",
  "Cellandning":"https://images.unsplash.com/photo-1581091870627-3b1c3d3b9b7c",
  "Ekologi":"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "Näringskedjor":"https://images.unsplash.com/photo-1474511320723-9a56873867b5",
  "Symbios":"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
};

const questions = [

{cat:"Fotosyntes", q:"Vad behöver växter för att överleva?", answer:"Solljus, koldioxid, vatten och näringsämnen"},
{cat:"Fotosyntes", q:"Vad bildas i fotosyntesen?", answer:"Druvsocker och syre"},

{
cat:"Fotosyntes",
q:"Vilken formel är rätt för fotosyntesen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:1
},

{cat:"Cellandning", q:"När sker cellandning i växter?", answer:"På natten och hela tiden"},
{cat:"Cellandning", q:"Vad bildas vid cellandning?", answer:"Koldioxid, vatten och energi"},

{
cat:"Cellandning",
q:"Vilken formel är rätt för cellandningen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:3
},

{cat:"Ekologi", q:"Vad är en generalist?", answer:"En art som klarar många miljöer och ofta är allätare"},
{cat:"Ekologi", q:"Vad är en specialist?", answer:"En art som kräver specifik miljö och ofta specifik föda"},
{cat:"Ekologi", q:"Vad är en producent?", answer:"Organismer som gör sin egen näring via fotosyntes"},
{cat:"Ekologi", q:"Ge exempel på producenter", answer:"Växter, alger och cyanobakterier"},
{cat:"Ekologi", q:"Vad är en konsument?", answer:"Djur som äter andra organismer"},
{cat:"Ekologi", q:"Vad är en nedbrytare?", answer:"Organismer som bryter ner döda växter och djur"},

{cat:"Näringskedjor", q:"Vad visar en näringskedja?", answer:"Vem äter vem"},
{cat:"Näringskedjor", q:"Var börjar en näringskedja?", answer:"Alltid med en producent"},

{cat:"Symbios", q:"Vad är symbios?", answer:"Samarbete mellan arter"},
{cat:"Symbios", q:"Vad är mutualism?", answer:"Båda arter tjänar på samarbetet"},
{cat:"Symbios", q:"Vad är parasitism?", answer:"En art tjänar och den andra skadas"}

];

let current = 0;
let score = 0;

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startQuiz() {
  if (document.getElementById("shuffle").checked) {
    shuffleArray(questions);
  }

  current = 0;
  score = 0;

  document.getElementById("startBtn").style.display = "none";

  showQuestion();
}

function showQuestion() {
  let q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progress").innerText =
    `Fråga ${current + 1} / ${questions.length}`;

  document.getElementById("image").src = images[q.cat];

  let answers = document.getElementById("answers");
  answers.innerHTML = "";

  document.getElementById("resultBox").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  if (q.a) {
    q.a.forEach((ans, i) => {
      let btn = document.createElement("button");
      btn.innerText = ans;
      btn.className = "answer-btn";

      btn.onclick = () => checkAnswer(i, btn);

      answers.appendChild(btn);
    });
  } else {
    let btn = document.createElement("button");
    btn.innerText = "Visa svar";
    btn.className = "answer-btn";

    btn.onclick = () => {
      document.getElementById("resultBox").innerText = q.answer;
      document.getElementById("nextBtn").style.display = "block";
    };

    answers.appendChild(btn);
  }

  updateScore();
}

function checkAnswer(i, btn) {
  let q = questions[current];
  let buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach(b => b.disabled = true);

  if (i === q.correct) {
    score++;
    btn.classList.add("correct");
    document.getElementById("resultBox").innerText = "Rätt! 🌱";
  } else {
    score--;
    btn.classList.add("wrong");
    document.getElementById("resultBox").innerText = "Fel ❌";
  }

  document.getElementById("nextBtn").style.display = "block";
  updateScore();
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let percent = Math.round(((score + questions.length) / (2 * questions.length)) * 100);

  document.getElementById("question").innerText = "🎉 Klart!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("image").style.display = "none";

  document.getElementById("resultBox").innerText =
    `Poäng: ${score}\nResultat: ${percent}%`;

  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("startBtn").style.display = "block";
  document.getElementById("startBtn").innerText = "Starta igen";
}

function updateScore() {
  document.getElementById("score").innerText = "Poäng: " + score;
}

</script>
