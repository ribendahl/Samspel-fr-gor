<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekologi Quiz</title>

<style>
body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #1d9e75, #0f6d52);
  margin: 0;
  color: #333;
}

.container {
  max-width: 600px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

#progress {
  font-size: 14px;
  color: #777;
  margin-bottom: 10px;
}

img {
  width: 100%;
  max-height: 180px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 15px;
}

button {
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-size: 15px;
  transition: 0.2s;
}

.answer-btn {
  background: #f1f1f1;
}

.answer-btn:hover {
  background: #ddd;
}

.correct {
  background: #1d9e75 !important;
  color: white;
}

.wrong {
  background: #e24b4a !important;
  color: white;
}

#nextBtn {
  display: none;
  background: #1d9e75;
  color: white;
  margin-top: 10px;
}

#startBtn {
  background: #1d9e75;
  color: white;
}

#resultBox {
  margin-top: 15px;
  font-weight: bold;
  white-space: pre-line;
}

#score {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Ekologi Quiz</h1>

<label>
<input type="checkbox" id="shuffle"> Blanda frågor
</label>

<br><br>

<button id="startBtn" onclick="startQuiz()">Starta</button>

<div id="progress"></div>

<img id="image" src="" alt="">

<h2 id="question"></h2>

<div id="answers"></div>

<div id="resultBox"></div>

<button id="nextBtn" onclick="nextQuestion()">Nästa →</button>

<p id="score"></p>

</div>

<script>

const images = {
  "Fotosyntes":"https://images.unsplash.com/photo-1501004318641-b39e6451bec6",
  "Cellandning":"https://images.unsplash.com/photo-1581091870627-3b1c3d3b9b7c",
  "Ekologi":"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "Näringskedjor":"https://images.unsplash.com/photo-1474511320723-9a56873867b5",
  "Symbios":"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
};

const questions = [
{cat:"Fotosyntes", q:"Vad behöver växter för att överleva?", answer:"Solljus, koldioxid, vatten och näringsämnen"},
{cat:"Fotosyntes", q:"Vad bildas i fotosyntesen?", answer:"Druvsocker och syre"},
{
cat:"Fotosyntes",
q:"Vilken formel är rätt för fotosyntesen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:1
},
{cat:"Cellandning", q:"När sker cellandning i växter?", answer:"På natten och hela tiden"},
{
cat:"Cellandning",
q:"Vilken formel är rätt för cellandningen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:3
},
{cat:"Ekologi", q:"Vad är en generalist?", answer:"En art som klarar många miljöer och ofta är allätare"},
{cat:"Ekologi", q:"Vad är en specialist?", answer:"En art som kräver specifik miljö och ofta har specifik föda"},
];

let current = 0;
let score = 0;

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startQuiz() {
  console.log("Start klickad"); // DEBUG

  if (document.getElementById("shuffle").checked) {
    shuffleArray(questions);
  }

  current = 0;
  score = 0;

  document.getElementById("startBtn").style.display = "none";

  showQuestion();
}

function showQuestion() {
  let q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progress").innerText =
    `Fråga ${current + 1} / ${questions.length}`;

  // SÄKER bild (fix)
  const img = document.getElementById("image");
  if (images[q.cat]) {
    img.src = images[q.cat];
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  let answers = document.getElementById("answers");
  answers.innerHTML = "";

  document.getElementById("resultBox").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  if (q.a) {
    q.a.forEach((ans, i) => {
      let btn = document.createElement("button");
      btn.innerText = ans;
      btn.className = "answer-btn";
      btn.onclick = () => checkAnswer(i, btn);
      answers.appendChild(btn);
    });
  } else {
    let btn = document.createElement("button");
    btn.innerText = "Visa svar";
    btn.className = "answer-btn";

    btn.onclick = () => {
      document.getElementById("resultBox").innerText = q.answer;
      document.getElementById("nextBtn").style.display = "block";
    };

    answers.appendChild(btn);
  }

  updateScore();
}

function checkAnswer(i, btn) {
  let q = questions[current];
  let buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach(b => b.disabled = true);

  if (i === q.correct) {
    score++;
    btn.classList.add("correct");
    document.getElementById("resultBox").innerText = "Rätt! 🌱";
  } else {
    score--;
    btn.classList.add("wrong");
    document.getElementById("resultBox").innerText = "Fel ❌";
  }

  document.getElementById("nextBtn").style.display = "block";
  updateScore();
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let percent = Math.round(((score + questions.length) / (2 * questions.length)) * 100);

  document.getElementById("question").innerText = "🎉 Klart!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("image").style.display = "none";

  document.getElementById("resultBox").innerText =
    `Poäng: ${score}\nResultat: ${percent}%`;

  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("startBtn").style.display = "block";
}

function updateScore() {
  document.getElementById("score").innerText = "Poäng: " + score;
}

</script>

</body>
</html>
