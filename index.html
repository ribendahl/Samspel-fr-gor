<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekologi - test</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4ef;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.answer-btn {
  display: block;
  width: 100%;
  margin: 8px 0;
  background: #eee;
}

.answer-btn:hover {
  background: #ddd;
}

#nextBtn {
  display: none;
  background: #1d9e75;
  color: white;
}

#startBtn {
  background: #1d9e75;
  color: white;
}

#resultBox {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Ekologi - instuderingsquiz</h1>

<label>
<input type="checkbox" id="shuffle">
Blanda frågor
</label>

<br><br>

<button id="startBtn" onclick="startQuiz()">Starta test</button>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="resultBox"></div>

<button id="nextBtn" onclick="nextQuestion()">Gå vidare →</button>

<p id="score"></p>

</div>

<script>

const questions = [
{cat:"Fotosyntes", q:"Vad behöver växter för att överleva?", answer:"Solljus, koldioxid, vatten och näringsämnen"},
{cat:"Fotosyntes", q:"Vad bildas i fotosyntesen?", answer:"Druvsocker och syre"},

{
cat:"Fotosyntes",
q:"Vilken formel är rätt för fotosyntesen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:1
},

{cat:"Cellandning", q:"När sker cellandning i växter?", answer:"På natten och hela tiden"},
{cat:"Cellandning", q:"Vad bildas vid cellandning?", answer:"Koldioxid, vatten och energi"},

{
cat:"Cellandning",
q:"Vilken formel är rätt för cellandningen?",
a:[
"koldioxid + syre → vatten + druvsocker + energi",
"vatten + koldioxid + energi → syre + druvsocker",
"druvsocker + koldioxid → vatten + syre",
"druvsocker + syre → koldioxid + vatten + energi"
],
correct:3
},

{cat:"Ekologi", q:"Vad är en producent?", answer:"Organismer som gör sin egen näring via fotosyntes"},
{cat:"Ekologi", q:"Ge exempel på producenter", answer:"Växter, alger och cyanobakterier"},
{cat:"Ekologi", q:"Vad är en konsument?", answer:"Djur som äter andra organismer"},
{cat:"Ekologi", q:"Vad är en nedbrytare?", answer:"Organismer som bryter ner döda växter och djur"},

{cat:"Näringskedjor", q:"Vad visar en näringskedja?", answer:"Vem äter vem"},
{cat:"Näringskedjor", q:"Var börjar en näringskedja?", answer:"Alltid med en producent"},

{cat:"Symbios", q:"Vad är symbios?", answer:"Samarbete mellan arter"},
{cat:"Symbios", q:"Vad är mutualism?", answer:"Båda arter tjänar på samarbetet"},
{cat:"Symbios", q:"Vad är parasitism?", answer:"En art tjänar och den andra skadas"},

{cat:"Ekologi", q:"Vad är konkurrens?", answer:"När organismer tävlar om resurser"},
{cat:"Ekologi", q:"Vad är en ekologisk nisch?", answer:"En arts roll och plats i naturen"},
{cat:"Ekologi", q:"Vad är en generalist?", answer:"En art som klarar många miljöer och ofta är allätare (äter olika typer av föda)"},
{cat:"Ekologi", q:"Vad är en specialist?", answer:"En art som kräver en specifik miljö och ofta har en specifik föda"}
];

let current = 0;
let score = 0;
let total = 0;

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startQuiz() {
  if (document.getElementById("shuffle").checked) {
    shuffleArray(questions);
  }

  current = 0;
  score = 0;
  total = questions.length;

  document.getElementById("startBtn").style.display = "none";

  showQuestion();
  updateScore();
}

function showQuestion() {
  let q = questions[current];

  document.getElementById("question").innerText = q.q;

  let answers = document.getElementById("answers");
  answers.innerHTML = "";

  document.getElementById("resultBox").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  // FLERVALSFRÅGA
  if (q.a) {
    q.a.forEach((ans, i) => {
      let btn = document.createElement("button");
      btn.innerText = ans;
      btn.className = "answer-btn";

      btn.onclick = function() {
        checkAnswer(i);
      };

      answers.appendChild(btn);
    });
  }

  // VANLIG FRÅGA
  else {
    let btn = document.createElement("button");
    btn.innerText = "Visa svar";
    btn.className = "answer-btn";

    btn.onclick = function() {
      document.getElementById("resultBox").innerText = q.answer;
      document.getElementById("nextBtn").style.display = "inline-block";
    };

    answers.appendChild(btn);
  }

  updateScore();
}
  function checkAnswer(i) {
  let q = questions[current];

  let buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach(b => b.disabled = true);

  if (i === q.correct) {
    score++;
    document.getElementById("resultBox").innerText = "Rätt! 🌱 +1 poäng";
  } else {
    score--;
    document.getElementById("resultBox").innerText = "Fel ❌ -1 poäng";
  }

  updateScore();
  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function correctAnswer() {
  score += 1;
}

function wrongAnswer() {
  score -= 1;
}

function showResult() {
  document.getElementById("question").innerText = "Test klart! 🎉";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  let percent = Math.round(((score + total) / (2 * total)) * 100);

  document.getElementById("resultBox").innerText =
    "Poäng: " + score + " av " + total +
    "\nResultat: " + percent + "%";

  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("startBtn").innerText = "Starta igen";
}

function updateScore() {
  document.getElementById("score").innerText = "Poäng: " + score;
}

</script>

</body>
</html>
